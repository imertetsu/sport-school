# Alembic configuration for CanteraSport.
#
# Alembic se ejecuta como OWNER/superusuario (rol postgres) usando la
# variable de entorno MIGRATION_DATABASE_URL. La URL NO se hardcodea aqui:
# env.py la lee de os.environ["MIGRATION_DATABASE_URL"].
#
# La app en runtime corre como cantera_app (DATABASE_URL), nunca por aqui.

[alembic]
# Ubicacion de los scripts de migracion (relativa a la raiz del repo).
script_location = migrations

# Prepende backend/ al sys.path para que `from app.models import Base`
# funcione cuando Alembic carga env.py.
prepend_sys_path = backend

# Plantilla de nombres de revision: 0001_slug, 0002_slug, ...
# (no usamos timestamps; numeracion secuencial explicita).
# file_template lo dejamos por defecto; las revisiones se nombran a mano.

# Zona horaria para timestamps en los archivos generados (opcional).
# timezone =

# La URL de la base de datos se inyecta en env.py desde el entorno
# (MIGRATION_DATABASE_URL). Se deja vacia a proposito: NO credenciales aqui.
sqlalchemy.url =


[post_write_hooks]
# No usamos hooks de formateo automatico por ahora.


# Logging
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
