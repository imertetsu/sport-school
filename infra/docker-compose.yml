# docker-compose para el stack local de LatinoSport.
#
# Orden de arranque:
#   db (healthy) -> api (corre `alembic upgrade head` como OWNER, luego uvicorn)
#   redis (healthy) -> worker / beat (Celery)
#   web (estático servido por nginx)
#
# Roles de BD (contrato C2):
#   - Alembic (en api) migra como OWNER:  MIGRATION_DATABASE_URL (rol postgres).
#   - La app (uvicorn/worker/beat) corre como latinosport_app (NOSUPERUSER,
#     NOBYPASSRLS): DATABASE_URL. NUNCA como superusuario (rompería la RLS).
#
# Variables: se leen de ../.env (ver ../.env.example).

name: latinosport

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      # Password del superusuario. Viene del .env (en prod el bootstrap genera uno
      # fuerte) y DEBE coincidir con el de MIGRATION_DATABASE_URL. Default `postgres`
      # para dev. OJO: Postgres solo aplica este password al INICIALIZAR el volumen
      # vacío; cambiarlo sobre un volumen existente NO lo actualiza (recrear con
      # `docker compose down -v`).
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: latinosport
    ports:
      # Puerto del host parametrizable (evita colisiones con otros Postgres en la
      # máquina de dev). Dentro de la red docker la app sigue usando db:5432.
      - "${DB_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      # pgcrypto (gen_random_uuid). Solo corre en init de volumen vacío.
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      # `pg_isready` contra usuario y base concretos.
      test: ["CMD-SHELL", "pg_isready -U postgres -d latinosport"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  api:
    # Build context = RAÍZ del repo: la imagen es AUTOCONTENIDA (incluye backend/,
    # alembic.ini y migrations/). No requiere montar el repo. Ver Dockerfile.api.
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    image: latinosport-api
    restart: unless-stopped
    # Solo este servicio aplica migraciones (migrador único, evita carreras).
    environment:
      RUN_MIGRATIONS: "1"
    env_file:
      - ../.env
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

  worker:
    # Reutiliza la imagen construida por `api` (mismo paquete `app`).
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    image: latinosport-api
    restart: unless-stopped
    environment:
      RUN_MIGRATIONS: "0"
    env_file:
      - ../.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    command: ["celery", "-A", "app.workers.celery_app", "worker", "--loglevel=info"]

  beat:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    image: latinosport-api
    restart: unless-stopped
    environment:
      RUN_MIGRATIONS: "0"
    env_file:
      - ../.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    # Un único beat (no replicar) para no programar cron doble.
    command: ["celery", "-A", "app.workers.celery_app", "beat", "--loglevel=info"]

  whatsapp-gateway:
    # Sidecar Baileys (WhatsApp NO-OFICIAL, WebSocket multidevice — NO Puppeteer).
    # MULTI-SESION: un solo proceso mantiene Map<org_id, Session>, un número por escuela.
    # Expone la HTTP API POR-ORG del contrato que consume el adaptador Python
    # `GatewayWhatsAppAdapter`:
    #   /sessions/{org_id}/status · /sessions/{org_id}/qr · /sessions/{org_id}/send ·
    #   DELETE /sessions/{org_id}  (más /healthz sin token). La vieja ruta global /send YA NO
    #   existe. NO es lógica de negocio: orquesta la sesión de cada org y reenvía el entrante
    #   (con su org_id) al webhook del backend.
    build:
      context: whatsapp-gateway
      dockerfile: Dockerfile
      args:
        # Solo para BUILD detrás del proxy TLS del equipo (gotcha del HANDOFF): pon
        # GATEWAY_BUILD_INSECURE_TLS=true en el .env para que npm/apt no fallen con
        # UNABLE_TO_VERIFY_LEAF_SIGNATURE. Default false (CI/prod usan CA confiable).
        INSECURE_TLS: ${GATEWAY_BUILD_INSECURE_TLS:-false}
    image: latinosport-whatsapp-gateway
    restart: unless-stopped
    # Lee GATEWAY_TOKEN / GATEWAY_PORT / INBOUND_CALLBACK_URL del .env (ver ../.env.example).
    # GATEWAY_TOKEN debe ser el MISMO valor que WHATSAPP_GATEWAY_TOKEN del backend.
    env_file:
      - ../.env
    ports:
      # Puerto host parametrizable; dentro de la red docker el backend lo alcanza por
      # http://whatsapp-gateway:3000 (== WHATSAPP_GATEWAY_URL). Exponerlo al host es
      # opcional (solo para ver /qr o /status desde la máquina del operador).
      - "${GATEWAY_PORT:-3000}:${GATEWAY_PORT:-3000}"
    volumes:
      # Persiste el auth-state multi-sesion de Baileys (un subdir por org bajo SESSIONS_ROOT
      # = /data/sessions) → sobrevive a reinicios sin re-escanear QR. El sidecar lista estos
      # subdirectorios al arranque y reconecta cada org.
      - whatsapp_sessions:/data/sessions
    # NO `depends_on: api`: el saliente tolera el gateway caído (ok:false) y el gateway
    # tolera que el callback entrante falle. Alcanza a `api` por la red interna cuando
    # ambos están arriba. Sin acoplamiento de arranque en ninguna dirección.

  web:
    restart: unless-stopped
    build:
      context: ../frontend
      dockerfile: ../infra/Dockerfile.web
      args:
        # Vacío por defecto = mismo origen (nginx proxya /api -> api:8000). Se respeta
        # el valor del .env aunque sea vacío (forma `-` sin `:`); en dev se puede fijar.
        VITE_API_URL: ${VITE_API_URL-}
    environment:
      VITE_API_URL: ${VITE_API_URL-}
    ports:
      - "${WEB_PORT:-5173}:5173"
    depends_on:
      api:
        condition: service_started

volumes:
  db_data:
  # Auth-state multi-sesion de Baileys del sidecar whatsapp-gateway: un subdirectorio por
  # org (${SESSIONS_ROOT}/${org_id}) bajo /data/sessions. OJO: contiene credenciales de las
  # sesiones de WhatsApp de CADA escuela → cifrado en reposo + acceso restringido a nivel
  # infra (RNF-02).
  whatsapp_sessions:
